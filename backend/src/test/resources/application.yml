# 통합 테스트 전용: 인메모리 H2 + 필수 더미 설정
# 콘솔: 쿼리 카운트(System.out)만 두드러지게, 스프링·하이버네이트·데이터 계층 INFO는 대부분 숨김
logging:
  level:
    root: WARN
    com.devnear: WARN
    org.springframework: WARN
    org.hibernate: WARN
    org.hibernate.orm.jdbc: WARN
    org.springframework.data: WARN
    com.zaxxer.hikari: WARN
    org.springdoc: ERROR
    org.springframework.messaging: WARN
    org.springframework.web.socket: WARN
    org.springframework.security: WARN
    org.springframework.orm.jpa: WARN
    org.springframework.boot.autoconfigure: WARN

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

spring:
  main:
    banner-mode: "off"
  datasource:
    url: jdbc:h2:mem:devneartest;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope:
              - email
              - profile

jwt:
  secret: test-jwt-secret-key-please-use-at-least-256-bits-for-hs256-xx
  expiration: 3600000

cloudinary:
  cloud-name: test
  api-key: test
  api-secret: test
  upload-folder: test

app:
  cors:
    allowed-origins: http://localhost:3000
  oauth2:
    redirect-uri: http://localhost:3000/oauth/redirect
    error-uri: http://localhost:3000/

kakao:
  maps:
    api-key: test
    rest-api-key: test

# TossPaymentConfig — @Value placeholders (main app often supplies via .env)
TOSS_PAYMENT_SECRET_KEY: test-toss-secret
TOSS_PAYMENT_CLIENT_KEY: test-toss-client
TOSS_PAYMENT_SUCCESS_URL: http://localhost:3000/payment/success
TOSS_PAYMENT_FAIL_URL: http://localhost:3000/payment/fail