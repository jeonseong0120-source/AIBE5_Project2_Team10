name: "AI Code Review"

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: AI Reviewer
        uses: anc95/ChatGPT-CodeReview@v1
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          model: "gpt-4o-mini"
          language: "Korean"
          github_token: ${{ secrets.GITHUB_TOKEN }}